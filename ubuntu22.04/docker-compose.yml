services:
  codex-master-worker:
    build:
      context: ..
      dockerfile: ubuntu22.04/Dockerfile
    image: codex-master-worker-oss:ubuntu22.04
    container_name: codex-master-worker-oss
    stdin_open: true
    tty: true
    working_dir: /opt/codex-claude-server-playbook
    environment:
      OPENAI_API_KEY: dummy-key
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      MODEL_NAME: qwen3:4b
      ORCH_MAX_FILES_PER_JOB: "2"
      ORCH_MAX_JOBS: "3"
      ORCH_INVENTORY_LIMIT: "12"
      GUARD_MAX_FILES: "2"
      GUARD_MAX_LINES_PER_FILE: "160"
      GUARD_MAX_BATCHES: "2"
    extra_hosts:
      - "host.docker.internal:host-gateway"
